<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GourmetFlow — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #ff6b35;
    --primary-dark: #e85d28;
    --primary-glow: rgba(255,107,53,0.25);
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f5;
    --text-muted: rgba(240,240,245,0.5);
    --error: #ff4d6d;
    --success: #00d48a;
    --radius: 16px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
    position: relative;
  }
  /* Animated background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(255,107,53,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(139,92,246,0.1) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .particles {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--primary);
    opacity: 0;
    animation: floatParticle linear infinite;
  }
  @keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.1; }
    100% { transform: translateY(-20px) scale(1); opacity: 0; }
  }
  .card {
    position: relative; z-index: 1;
    background: rgba(14,14,22,0.85);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    width: min(480px, 95vw);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
    animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--primary), #ff9500);
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 16px;
    box-shadow: 0 16px 32px var(--primary-glow);
    animation: pulse 3s ease infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 16px 32px var(--primary-glow); }
    50% { box-shadow: 0 16px 48px rgba(255,107,53,0.4); }
  }
  .logo h1 {
    font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .logo p {
    font-size: 13px; color: var(--text-muted); margin-top: 4px;
    font-weight: 400;
  }
  .welcome {
    text-align: center; margin-bottom: 32px;
  }
  .welcome h2 {
    font-size: 20px; font-weight: 600; color: var(--text);
  }
  .welcome p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  .form-group {
    margin-bottom: 20px;
    position: relative;
  }
  label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
    display: flex; align-items: center;
  }
  .input-icon {
    position: absolute; left: 14px; font-size: 18px; z-index: 2;
    pointer-events: none;
  }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 14px 44px 14px 44px;
    outline: none;
    transition: var(--transition);
  }
  input:focus {
    border-color: var(--primary);
    background: rgba(255,107,53,0.06);
    box-shadow: 0 0 0 3px var(--primary-glow);
  }
  input::placeholder { color: var(--text-muted); }
  .toggle-pwd {
    position: absolute; right: 14px;
    cursor: pointer; font-size: 18px;
    color: var(--text-muted);
    transition: var(--transition);
    background: none; border: none;
    z-index: 2;
  }
  .toggle-pwd:hover { color: var(--primary); }
  .error-msg {
    display: none;
    font-size: 12px; color: var(--error);
    margin-top: 6px;
    padding-left: 4px;
  }
  .error-msg.show { display: block; animation: shake 0.3s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .alert-box {
    display: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .alert-box.error {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,77,109,0.12);
    border: 1px solid rgba(255,77,109,0.3);
    color: var(--error);
  }
  .alert-box.success {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,212,138,0.12);
    border: 1px solid rgba(0,212,138,0.3);
    color: var(--success);
  }
  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, #ff9500 100%);
    color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; font-family: inherit;
    padding: 15px;
    cursor: pointer;
    transition: var(--transition);
    position: relative; overflow: hidden;
    letter-spacing: 0.3px;
    margin-top: 8px;
  }
  .btn-login::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: var(--transition);
  }
  .btn-login:hover:not(:disabled)::before { background: rgba(255,255,255,0.15); }
  .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 28px var(--primary-glow); }
  .btn-login:active:not(:disabled) { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .loader {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider {
    text-align: center; position: relative; margin: 24px 0;
    color: var(--text-muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    width: 40%; height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .footer-links {
    text-align: center; font-size: 13px; color: var(--text-muted);
  }
  .footer-links a {
    color: var(--primary); text-decoration: none; font-weight: 600;
    transition: var(--transition);
  }
  .footer-links a:hover { text-decoration: underline; opacity: 0.85; }
  .forgot { text-align: right; font-size: 12px; margin-top: 6px; }
  .forgot a { color: var(--text-muted); text-decoration: none; transition: var(--transition); }
  .forgot a:hover { color: var(--primary); }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <h1>GourmetFlow</h1>
    <p>Premium Food Delivery Platform</p>
  </div>

  <div class="welcome">
    <h2>Welcome Back 👋</h2>
    <p>Sign in to track your orders in real-time</p>
  </div>

  <div class="alert-box" id="alertBox"></div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="error-msg" id="emailErr">Please enter a valid email address</div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Toggle password visibility">👁️</button>
      </div>
      <div class="error-msg" id="passErr">Password is required</div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
  </form>

  <div class="divider">or</div>

  <div class="footer-links">
    Don't have an account? <a href="register.html">Create Account</a>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const BACKEND_URL = 'https://gourmetflow-backend-arul.loca.lt';

  function getApiBase() {
    const stored = localStorage.getItem('gf_backend_url');
    if (stored && !stored.includes('.lhr.life')) return stored;
    return BACKEND_URL;
  }

  // ── Particles ────────────────────────────────────────────────────────────────
  (function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 15 + 10}s;
        animation-delay: ${Math.random() * 10}s;
      `;
      container.appendChild(p);
    }
  })();

  // ── Form Handlers ─────────────────────────────────────────────────────────────
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const alertBox = document.getElementById('alertBox');
  const togglePwd = document.getElementById('togglePwd');

  togglePwd.addEventListener('click', () => {
    if (passInput.type === 'password') {
      passInput.type = 'text';
      togglePwd.textContent = '🙈';
    } else {
      passInput.type = 'password';
      togglePwd.textContent = '👁️';
    }
  });

  function showAlert(type, msg) {
    alertBox.className = `alert-box ${type}`;
    alertBox.innerHTML = `<span>${type === 'error' ? '⚠️' : '✅'}</span> ${msg}`;
  }

  function hideAlert() {
    alertBox.className = 'alert-box';
    alertBox.innerHTML = '';
  }

  function setLoading(loading) {
    loginBtn.disabled = loading;
    loginBtn.innerHTML = loading
      ? '<span class="loader"></span> Signing In...'
      : 'Sign In';
  }

  function validate() {
    let ok = true;
    const emailErr = document.getElementById('emailErr');
    const passErr = document.getElementById('passErr');
    const emailVal = emailInput.value.trim();
    const passVal = passInput.value;
    emailErr.classList.remove('show');
    passErr.classList.remove('show');

    if (!emailVal || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
      emailErr.classList.add('show');
      ok = false;
    }
    if (!passVal) {
      passErr.classList.add('show');
      ok = false;
    }
    return ok;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    if (!validate()) return;

    setLoading(true);
    try {
      const res = await fetch(`${getApiBase()}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: emailInput.value.trim(),
          password: passInput.value
        })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert('error', data.error || 'Login failed. Please try again.');
        setLoading(false);
        return;
      }

      // Store auth info
      localStorage.setItem('gf_token', data.token);
      localStorage.setItem('gf_user', JSON.stringify({
        id: data.userId,
        email: data.email,
        fullName: data.fullName,
        roles: data.roles
      }));

      showAlert('success', `Welcome back, ${data.fullName}! Redirecting...`);

      // Redirect based on role
      const isAdmin = data.roles && data.roles.includes('ROLE_ADMIN');
      setTimeout(() => {
        window.location.href = isAdmin ? 'admin-dashboard.html' : 'user-dashboard.html';
      }, 1200);

    } catch (err) {
      showAlert('error', '⚡ Cannot reach server. Check your connection.');
      setLoading(false);
    }
  });

  // Auto-redirect if already logged in
  (function checkSession() {
    const token = localStorage.getItem('gf_token');
    const user = localStorage.getItem('gf_user');
    if (token && user) {
      try {
        const u = JSON.parse(user);
        const isAdmin = u.roles && u.roles.includes('ROLE_ADMIN');
        window.location.href = isAdmin ? 'admin-dashboard.html' : 'user-dashboard.html';
      } catch (_) { localStorage.clear(); }
    }
  })();
</script>
</body>
</html>
