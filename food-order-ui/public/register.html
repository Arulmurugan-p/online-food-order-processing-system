<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GourmetFlow — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #ff6b35;
    --primary-dark: #e85d28;
    --primary-glow: rgba(255,107,53,0.25);
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f5;
    --text-muted: rgba(240,240,245,0.5);
    --error: #ff4d6d;
    --success: #00d48a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(255,107,53,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(139,92,246,0.1) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; z-index: 1;
    background: rgba(14,14,22,0.85);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 40px;
    width: min(500px, 100%);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--primary), #ff9500);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 12px;
    box-shadow: 0 12px 28px var(--primary-glow);
  }
  .logo h1 {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { margin-bottom: 16px; position: relative; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-icon { position: absolute; left: 13px; font-size: 16px; pointer-events: none; }
  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 11px;
    color: var(--text);
    font-size: 14px; font-family: inherit;
    padding: 13px 42px 13px 40px;
    outline: none; transition: 0.3s;
  }
  input:focus {
    border-color: var(--primary);
    background: rgba(255,107,53,0.06);
    box-shadow: 0 0 0 3px var(--primary-glow);
  }
  input::placeholder { color: var(--text-muted); }
  .toggle-pwd {
    position: absolute; right: 13px;
    cursor: pointer; font-size: 16px;
    color: var(--text-muted); background: none; border: none;
    transition: 0.2s;
  }
  .toggle-pwd:hover { color: var(--primary); }
  .error-msg { display: none; font-size: 11px; color: var(--error); margin-top: 5px; padding-left: 2px; }
  .error-msg.show { display: block; }
  input.invalid { border-color: var(--error); }
  .password-strength {
    height: 3px; border-radius: 2px;
    background: var(--border); margin-top: 6px;
    overflow: hidden;
  }
  .strength-bar {
    height: 100%; width: 0;
    transition: 0.4s; border-radius: 2px;
  }
  .alert-box {
    display: none; border-radius: 11px;
    padding: 11px 14px; font-size: 13px;
    margin-bottom: 18px; font-weight: 500;
  }
  .alert-box.error { display: flex; align-items: center; gap: 8px; background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.3); color: var(--error); }
  .alert-box.success { display: flex; align-items: center; gap: 8px; background: rgba(0,212,138,0.12); border: 1px solid rgba(0,212,138,0.3); color: var(--success); }
  .btn-register {
    width: 100%; margin-top: 8px;
    background: linear-gradient(135deg, var(--primary) 0%, #ff9500 100%);
    color: #fff; border: none; border-radius: 11px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    padding: 14px; cursor: pointer; transition: 0.3s;
    position: relative; overflow: hidden;
  }
  .btn-register::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0); transition: 0.3s;
  }
  .btn-register:hover:not(:disabled)::before { background: rgba(255,255,255,0.12); }
  .btn-register:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 24px var(--primary-glow); }
  .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }
  .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer-links { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 20px; }
  .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .footer-links a:hover { text-decoration: underline; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } .card { padding: 32px 24px; } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <h1>GourmetFlow</h1>
    <p>Premium Food Delivery Platform</p>
  </div>

  <h2>Create Account 🚀</h2>
  <p class="subtitle">Join thousands of food lovers today</p>

  <div class="alert-box" id="alertBox"></div>

  <form id="regForm" novalidate>
    <div class="form-row">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="fullName" placeholder="John Doe" required>
        </div>
        <div class="error-msg" id="nameErr">Full name required (min 2 chars)</div>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <div class="input-wrap">
          <span class="input-icon">📱</span>
          <input type="text" id="phone" placeholder="9876543210" maxlength="10" required>
        </div>
        <div class="error-msg" id="phoneErr">Enter valid 10-digit number</div>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">📧</span>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="error-msg" id="emailErr">Enter a valid email address</div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Min 6 characters" required>
        <button type="button" class="toggle-pwd" id="togglePwd">👁️</button>
      </div>
      <div class="password-strength"><div class="strength-bar" id="strengthBar"></div></div>
      <div class="error-msg" id="passErr">Password must be at least 6 characters</div>
    </div>

    <div class="form-group">
      <label for="confirmPwd">Confirm Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔐</span>
        <input type="password" id="confirmPwd" placeholder="Re-enter password" required>
      </div>
      <div class="error-msg" id="confirmErr">Passwords do not match</div>
    </div>

    <button type="submit" class="btn-register" id="regBtn">Create Account</button>
  </form>

  <div class="footer-links">
    Already have an account? <a href="login.html">Sign In</a>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://gourmetflow-backend-arul.loca.lt';
  function getApiBase() {
    const s = localStorage.getItem('gf_backend_url');
    return (s && !s.includes('.lhr.life')) ? s : BACKEND_URL;
  }

  const togglePwd = document.getElementById('togglePwd');
  const passInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirmPwd');
  const alertBox = document.getElementById('alertBox');
  const regBtn = document.getElementById('regBtn');

  // Toggle password
  togglePwd.addEventListener('click', () => {
    const show = passInput.type === 'password';
    passInput.type = show ? 'text' : 'password';
    confirmInput.type = show ? 'text' : 'password';
    togglePwd.textContent = show ? '🙈' : '👁️';
  });

  // Password strength
  passInput.addEventListener('input', () => {
    const v = passInput.value;
    const bar = document.getElementById('strengthBar');
    let strength = 0;
    if (v.length >= 6) strength++;
    if (v.length >= 10) strength++;
    if (/[A-Z]/.test(v)) strength++;
    if (/[0-9]/.test(v)) strength++;
    if (/[^A-Za-z0-9]/.test(v)) strength++;
    const colors = ['', '#ff4d6d', '#ff9500', '#ffd60a', '#00d48a', '#00b4d8'];
    bar.style.width = `${strength * 20}%`;
    bar.style.background = colors[strength];
  });

  function showAlert(type, msg) {
    alertBox.className = `alert-box ${type}`;
    alertBox.innerHTML = `<span>${type === 'error' ? '⚠️' : '✅'}</span> ${msg}`;
  }

  function setLoading(l) {
    regBtn.disabled = l;
    regBtn.innerHTML = l ? '<span class="loader"></span> Creating Account...' : 'Create Account';
  }

  function validate() {
    let ok = true;
    const fields = [
      { id: 'fullName', errId: 'nameErr', test: v => v.trim().length >= 2 },
      { id: 'phone', errId: 'phoneErr', test: v => /^[6-9]\d{9}$/.test(v) },
      { id: 'email', errId: 'emailErr', test: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) },
      { id: 'password', errId: 'passErr', test: v => v.length >= 6 },
    ];
    fields.forEach(({ id, errId, test }) => {
      const el = document.getElementById(id);
      const err = document.getElementById(errId);
      if (!test(el.value)) {
        err.classList.add('show');
        el.classList.add('invalid');
        ok = false;
      } else {
        err.classList.remove('show');
        el.classList.remove('invalid');
      }
    });
    const confirmErr = document.getElementById('confirmErr');
    if (confirmInput.value !== passInput.value) {
      confirmErr.classList.add('show');
      ok = false;
    } else {
      confirmErr.classList.remove('show');
    }
    return ok;
  }

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'alert-box';
    if (!validate()) return;

    setLoading(true);
    try {
      const res = await fetch(`${getApiBase()}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fullName: document.getElementById('fullName').value.trim(),
          email: document.getElementById('email').value.trim(),
          phoneNumber: document.getElementById('phone').value.trim(),
          password: passInput.value,
          confirmPassword: confirmInput.value
        })
      });

      const data = await res.json();
      if (!res.ok) {
        showAlert('error', data.error || 'Registration failed. Please try again.');
        setLoading(false);
        return;
      }

      localStorage.setItem('gf_token', data.token);
      localStorage.setItem('gf_user', JSON.stringify({
        id: data.userId, email: data.email,
        fullName: data.fullName, roles: data.roles
      }));

      showAlert('success', `Account created! Welcome, ${data.fullName}! Redirecting...`);
      setTimeout(() => { window.location.href = 'user-dashboard.html'; }, 1500);

    } catch (err) {
      showAlert('error', '⚡ Cannot reach server. Check your connection.');
      setLoading(false);
    }
  });
</script>
</body>
</html>
