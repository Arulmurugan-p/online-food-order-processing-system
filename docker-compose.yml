version: '3.8'

services:
  # MySQL Database Instance
  mysql:
    image: mysql:8.0
    container_name: foodorder-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql

  # Apache ActiveMQ Message Broker
  activemq:
    image: rmohr/activemq:latest
    container_name: foodorder-activemq
    ports:
      - "61616:61616" # OpenWire JMS TCP port
      - "8161:8161"   # Admin web console port
    environment:
      - ACTIVEMQ_ADMIN_USER=admin
      - ACTIVEMQ_ADMIN_PASSWORD=admin

volumes:
  mysql-data:
