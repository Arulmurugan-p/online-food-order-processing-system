server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

activemq:
  broker-url: tcp://localhost:61616
  user: admin
  password: admin

camunda:
  bpm:
    enabled: true
    database:
      schema-update: true
    history-level: full
    generic-properties:
      properties:
        historyTimeToLive: P30D
    admin-user:
      id: admin
      password: admin
      email: admin@foodorder.com
      firstName: Admin
      lastName: User
    filter:
      create: All Tasks
