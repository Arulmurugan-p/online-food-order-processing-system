server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/food_order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

activemq:
  broker-url: tcp://localhost:61616
  user: admin
  password: admin

camunda:
  bpm:
    enabled: true
    database:
      schema-update: true
    history-level: full
    generic-properties:
      properties:
        historyTimeToLive: P30D
    admin-user:
      id: admin
      password: admin
      email: admin@foodorder.com
      firstName: Admin
      lastName: User
    filter:
      create: All Tasks

# JWT configuration
jwt:
  secret: ${JWT_SECRET:food-order-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173,https://arulmurugan-p.github.io}

# Saga simulation (disable for real manual workflow)
saga:
  simulation:
    enabled: ${SAGA_SIMULATION_ENABLED:false}

logging:
  level:
    com.foodorder: INFO
    org.springframework.security: WARN
