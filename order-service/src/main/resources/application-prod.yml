# Production profile — used when deployed to Render.com
# Activates Saga simulation mode (no external microservices needed)

server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false   # Disable H2 console in production
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false    # Quieter logs in production

# ActiveMQ still embedded — used for internal messaging if needed
activemq:
  broker-url: vm://localhost
  user: admin
  password: admin

# Camunda BPMN engine
camunda:
  bpm:
    enabled: true
    database:
      schema-update: true
    history-level: none
    generic-properties:
      properties:
        historyTimeToLive: P1D
    admin-user:
      id: admin
      password: admin
      email: admin@foodorder.com
      firstName: Admin
      lastName: User
    filter:
      create: All Tasks

# === KEY: Enables built-in Saga simulation ===
saga:
  simulation:
    enabled: true

# CORS — allows requests from Firebase Hosting domain
cors:
  allowed-origins: "https://gourmetflow-food-order.web.app,https://gourmetflow-food-order.firebaseapp.com,http://localhost:5500,http://127.0.0.1:5500"
